spring:
  application:
    name: taco-cloud
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    default: local
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    web:
      pageable:
        max-page-size: 100
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        delivery.timeout.ms: 5000
        request.timeout.ms: 3000
        max.block.ms: 3000

tacos:
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    orders-events-topic: ${KAFKA_ORDERS_TOPIC:orders.events}
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:50}
    publish-interval: ${OUTBOX_PUBLISH_INTERVAL:1s}
    send-timeout: ${OUTBOX_SEND_TIMEOUT:10s}
    retention: ${OUTBOX_RETENTION:7d}
    cleanup-cron: "${OUTBOX_CLEANUP_CRON:0 0 3 * * *}"

springdoc:
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html
