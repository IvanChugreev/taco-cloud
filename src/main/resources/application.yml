spring:
  application:
    name: taco-cloud
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    default: local
  thymeleaf:
    cache: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    web:
      pageable:
        max-page-size: 100

springdoc:
  paths-to-match: /api/v1/**
  swagger-ui:
    path: /swagger-ui.html
